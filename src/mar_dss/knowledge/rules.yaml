  - id: "unconfined"
    name: "Unconfined Aquifer"
    #symbol: "unconfined"
    description: "Branch for unconfined aquifer"
    type: categorical 
    module: "geohydro_rules"
    function_name: "is_unconfined"
    dependencies: [aq_type]
    certainty: 1.0
    group: "Aquifer Characteristics"
    leaf: false

  - id: "confined"
    name: "Confined Aquifer"
    #symbol: "confined"
    description: "Branch for confined aquifer"
    type: categorical 
    module: "geohydro_rules"
    function_name: "is_confined"
    dependencies: [aq_type]
    certainty: 1.0
    group: "Aquifer Characteristics"
    leaf: false

  - id: "strat_df"
    name: "Stratigraphy Dataframe"
    #symbol: "stratigraphy_table"
    description: "Get or retrieve the stratigraphy table"
    type: pandas_dataframe
    module: "geohydro_rules"
    function_name: "get_stratigraphy_table"
    dependencies: [stratigraphy_table]
    certainty: 1.0
    group: "Aquifer Characteristics"
    leaf: false


  - id: "limiting_layer"
    name: "Limiting Layer"
    #symbol: "limiting_layer_id"
    description: "Finds vadose limiting layer"
    type: categorical
    module: "geohydro_rules"
    function_name: "find_limiting_layer"
    dependencies: [strat_df, unconfined, monthly_gw_depth]
    certainty: 0.9
    group: "Aquifer Characteristics"
    leaf: false
  
  - id: "k_min_vadose"
    name: "Minimum K in Vadose Zone"
    #symbol: "K_min"
    description: "Find vadose K_min"
    type: numeric  
    module: "geohydro_rules"
    function_name: "find_min_k_vadose_zone"
    dependencies: [strat_df, limiting_layer]
    certainty: 0.9
    group: "Aquifer Characteristics"
    leaf: false

  - id: "top_soil_removability"
    name: "Topsoil Limiting Layer Removability"
    #symbol: "TopRem"
    description: "Checks if top layer is limiting and <3 ft (removable)."
    type: boolean
    module: "geohydro_rules"
    function_name: "check_topsoil_limiting"
    dependencies: [limiting_layer, k_min_vadose]
    certainty: 0.8
    group: "Surface Feasibility"
    leaf: false

  - id: "op_gw_depth"
    name: "Operational GW Depth"
    #symbol: "Dgw_ok"
    description: "Compute the actuall minimum operational/actual grounwater depth"
    type: numeric
    module: "geohydro_rules"
    function_name: "compute_min_gw_depth"
    dependencies: [limiting_layer, strat_df, d_gw_min]
    certainty: 1.0
    group: "Constraints"
    leaf: false

  - id: "design_sizing"
    name: "Compute Spreading Area"
    #symbol: "Spread"
    description: "Computes spread area and operational groundwater depth."
    type: numeric
    module: "geohydro_rules"
    function_name: "compute_spread_area"
    dependencies: [k_min_vadose, max_available_area, d_gw_min, source_water_volume]
    certainty: 0.8
    group: "Design Sizing"
    leaf: false

