inputs:
  - id: "aq_type"
    name: "Aquifer Type"
    description: "Geologic type of the aquifer provided by the user"
    type: categorical
    value: "Unconfined"
    default: "Unconfined"
    allowed_values: ["Confined", "Unconfined", "Semi-confined", "Karstic", "Fractured", "Other"]
    certainty: 1.0
    group: "Aquifer Properties"

  - id: "stratigraphy_table"
    name: "Stratigraphy Table"
    description: "A table with a list of layers, for each thickness, K, sy/ss are provided"
    type: pandas_dataframe
    units: ["ft", "ft/day", None]
    value: [[50, 50, 0.15]]
    default: [50, 50, 0.15]
    range: [[1e-6, 2000], [1e-6, 2000], [0.01, 0.7]]
    certainty: 1.0
    group: "Aquifer Properties"

  - id: "monthly_gw_depth"
    name: "Groundwater Depth"
    description: "Depth to groundwater table for each month"
    type: list of  numeric
    units: "ft"
    value: [20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20]
    default: [20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20]    
    range: [0, 2000]
    certainty: 1.0
    group: "Aquifer Properties"

  - id: "d_gw_min"
    name: "Minimum Groundwater Depth"
    description: "Minimum depth of groundwater below ground surface before waterlogging issues occur"
    type: numeric
    units: "m"
    value: 5.0
    default: 5.0
    range: [0.0, 100.0]
    certainty: 0.8
    group: "Design Sizing"
  
  - id: "max_available_area"
    name: "Maximum Available Area"
    description: "Maximum available area for the site"
    type: numeric
    units: "ft2"
    value: 1e7
    default: 1e7
    range: [0.0, 1e7]
    certainty: 0.8
    group: "Design Sizing"

  - id: "source_water_volume"
    name: "Monthly Available Source Water Volume"
    description: "Volume of water available for use"
    type: numeric
    units: "ft3/month"
    value: [300000, 300000, 300000, 300000, 300000, 300000, 300000, 300000, 300000, 300000, 300000, 300000]
    range: [0, 1e7]
    certainty: 0.85
    group: "Water Balance"
  
  
  - id: "Hmax"
    name: "Maximum Allowable pressure"
    description: "Maximum allowable hydraulic head change in confined aquifers to prevent too much land uplift, fracturing, ord environmental impacts"
    type: numeric
    units: "ft"
    value: 75
    default: 100
    range: [0.1, 1000.0]
    certainty: 0.85
    group: "Aquifer Properties"
  
  - id: "ground_surface_slope"
    name: "Ground Surface Slope"
    description: "Ground surface slope (rise/run ratio, e.g., 0.01 = 1% slope, 0.02 = 2% slope). Typical values: 0.0-0.1 for gentle slopes, 0.1-0.3 for moderate, >0.3 for steep."
    type: numeric
    units: "%"
    value: 0.0
    default: 0.0
    range: [0.0, 100.0]
    certainty: 0.85
    group: "Site Characteristics"

  - id: "vadose_pollution_flag"
    name: "Vadose Zone Pollution Flag"
    description: "Indicates presence of pollution or contamination in the vadose zone. Can be boolean (True/False), list of contaminants, or concentration data."
    type: boolean
    value: false
    default: false
    certainty: 0.8
    group: "Environmental Quality"
  
  - id: "vadose_pollution_high_toxicity"
    name: "Vadose Zone High Toxicity Flag"
    description: "Indicates presence of highly toxic contaminants in the vadose zone (e.g., heavy metals, volatile organic compounds, radioactive materials)"
    type: boolean
    value: false
    default: false
    certainty: 0.8
    group: "Environmental Quality"
  
    

